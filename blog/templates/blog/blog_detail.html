{% extends 'base.html' %}

{% block content %}
<div class="container">
  <h1>{{ blog.title }}</h1>
  {% if blog.preview %}
    <img src="{{ blog.preview.url }}" class="img-fluid" alt="{{ blog.title }}">
  {% endif %}
  <p>{{ blog.content }}</p>
  <p><strong>Просмотры:</strong> {{ blog.views_count }}</p>
  <a href="{% url 'blog:blog_update' blog.pk %}" class="btn btn-warning">Редактировать</a>
  <a href="{% url 'blog:blog_delete' blog.pk %}" class="btn btn-danger">Удалить</a>
</div>
{% endblock %}
