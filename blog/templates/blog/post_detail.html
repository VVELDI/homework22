{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
  <article>
    <h1>{{ post.title }}</h1>
    {% if post.preview %}
      <img src="{{ post.preview.url }}" class="img-fluid my-3" alt="{{ post.title }}">
    {% endif %}
    <p>{{ post.content }}</p>
    <div class="text-muted">
      <small>
        Опубликовано: {{ post.created_at|date:"d.m.Y" }} |
        Просмотров: {{ post.views_count }}
      </small>
    </div>
  </article>
  <a href="{% url 'blog:post_list' %}" class="btn btn-secondary mt-3">← Назад к списку</a>
</div>
{% endblock %}
