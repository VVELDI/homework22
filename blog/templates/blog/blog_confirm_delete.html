{% extends 'base.html' %}

{% block content %}
<div class="container">
  <h1>Удалить статью?</h1>
  <p>Вы уверены, что хотите удалить "{{ object.title }}"?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'blog:blog_detail' object.pk %}" class="btn btn-secondary">Отмена</a>
  </form>
</div>
{% endblock %}
